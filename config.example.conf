[GLOBAL]
data_path = /srv/ircabot/data

# Web interface (multithreaded, JS-free; JS is used only on /~realtime/ pages).
bind_to_address = 127.0.0.1
bind_to_port = 8080
service_name = IRCaBot
service_emoji = &#128193;
# Uncomment to remove real time reading mode (and all JavaScript with it):
#realtime_disabled = true

# Defaults for all servers:
nick = default_nickname
user = default_ident
real_name = default_real_name
# If empty - logging in without NickServ password:
password =

# Bot answers when addressed: "botnick, version". Format: request ::: answer <!> ...
# %CHANNEL_FOR_URL% is replaced with server_slug/channel of the requesting chat.
triggers = version ::: IRCaBot 3.0.0 <!> webui ::: http://example.com/%CHANNEL_FOR_URL%

[Displayed server name]
address = 127.0.0.1
port = 6667
# TLS connection to IRC server:
#ssl = true
# Channels are splitted with comma:
channels = #general,#test
# Optional per-server overrides:
#nick = unique_nickname
#user = unique_ident
#real_name = unique_real_name
#password = password_for_this_server
#triggers = hi ::: hello
